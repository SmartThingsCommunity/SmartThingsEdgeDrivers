name: thermostat
components:
  - id: main
    categories:
      - name: Thermostat
    capabilities:
      - id: temperatureMeasurement
        version: 1
      - id: thermostatHeatingSetpoint
        version: 1
        config:
          values:
            - key: "heatingSetpoint.value"
              range: [5, 30]
              step: 0.5
      - id: thermostatMode
        version: 1
        config:
          values:
            - key: "thermostatMode.value"
              enabledValues:
                - antifreezing
                - auto
                - comfort
                - eco
                - off
                - on
      - id: battery
        version: 1
      - id: refresh
        version: 1
