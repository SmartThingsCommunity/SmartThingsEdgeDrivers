name: aqara-bath-heater
components:
  - id: main
    capabilities:
      - id: switch
        version: 1
      - id: switchLevel
        version: 1
      - id: colorTemperature
        version: 1
        config:
          values:
            - key: "colorTemperature.value"
              range: [2700, 6500]
      - id: thermostatMode
        version: 1
        config:
          values:
            - key: "thermostatMode.value"
              enabledValues:
                - "off"
                - "heat"
                - "dryair"
                - "cool"
                - "fanonly"
      - id: thermostatHeatingSetpoint
        version: 1
        config:
          values:
            - key: "thermostatHeatingSetpoint.value"
              range: [16, 45]
              unit: "C"
      - id: fanOscillationMode
        version: 1
        config:
          values:
            - key: "fanOscillationMode.value"
              enabledValues:
                - "swing"
                - "fixed"
      - id: fanMode
        version: 1
        config:
          values:
            - key: "fanMode.value"
              enabledValues:
                - "low"
                - "medium"
                - "high"
      - id: refresh
        version: 1
    categories:
      - name: Thermostat
deviceConfig:
  dashboard:
    states:
      - component: main
        capability: switch
        version: 1
      - component: main
        capability: fanMode
        version: 1
    actions:
    - component: main
      capability: switch
      version: 1
  detailView:
  - component: main
    capability: switch
    version: 1
  - component: main
    capability: switchLevel
    version: 1
  - component: main
    capability: colorTemperature
    version: 1
  - component: main
    capability: thermostatMode
    version: 1
  - component: main
    capability: thermostatHeatingSetpoint
    version: 1
    visibleCondition:
      component: main
      capability: thermostatMode
      version: 1
      value: thermostatMode.value
      operator: EQUALS
      operand: "heat"
  - component: main
    capability: fanOscillationMode
    version: 1
    visibleCondition:
      component: main
      capability: thermostatMode
      version: 1
      value: thermostatMode.value
      operator: ONE_OF
      operand: '["heat", "dryair", "cool"]'
  - component: main
    capability: fanMode
    version: 1
    visibleCondition:
      component: main
      capability: thermostatMode
      version: 1
      value: thermostatMode.value
      operator: ONE_OF
      operand: '["heat", "dryair", "cool", "fanonly"]'
  - component: main
    capability: refresh
    version: 1
  automation:
    conditions:
    - component: main
      capability: switch
      version: 1
    - component: main
      capability: switchLevel
      version: 1
    - component: main
      capability: colorTemperature
      version: 1
    - component: main
      capability: thermostatMode
      version: 1
    - component: main
      capability: thermostatHeatingSetpoint
      version: 1
    - component: main
      capability: fanOscillationMode
      version: 1
    - component: main
      capability: fanMode
      version: 1
      values:
        - key: "fanMode.value"
          enabledValues:
            - "low"
            - "medium"
            - "high"
    actions:
    - component: main
      capability: switch
      version: 1
    - component: main
      capability: switchLevel
      version: 1
    - component: main
      capability: colorTemperature
      version: 1
    - component: main
      capability: thermostatMode
      version: 1
    - component: main
      capability: thermostatHeatingSetpoint
      version: 1
    - component: main
      capability: fanOscillationMode
      version: 1
    - component: main
      capability: fanMode
      version: 1
      values:
        - key: "setFanMode.fanMode"
          enabledValues:
            - "low"
            - "medium"
            - "high"
preferences:
  - preferenceId: stse.nightLightMode
    explicit: true
  - preferenceId: stse.nightLightStartTime
    explicit: true
  - preferenceId: stse.nightLightEndTime
    explicit: true
  - preferenceId: stse.muteBeep
    explicit: true
  - preferenceId: stse.thermostatCtrl
    explicit: true
