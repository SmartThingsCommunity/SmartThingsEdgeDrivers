name: fireavert-appliance-shutoff-electric
components:
- id: main
  label: "Appliance Information"
  capabilities:
  - id: soundDetection
    version: 1
    config:
      values:
        - key: supportedSoundTypes.value
          enabledValues:
            - noSound
            - fireAlarm
  - id: switch
    version: 1
  - id: applianceUtilization
    version: 1
  - id: remoteControlStatus
    version: 1
  categories:
    - name: SmokeDetector
