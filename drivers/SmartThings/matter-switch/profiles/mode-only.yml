name: mode-only
components:
- id: main
  capabilities:
  - id: mode
    version: 1
  - id: refresh
    version: 1
  - id: firmwareUpdate
    version: 1
  categories:
  - name: Thermostat
deviceConfig:
  detailView:
  - component: main
    capability: mode
    version: 1
    patch:
    - op: replace
      path: /0/list/command/supportedValues
      value: supportedArguments.value
  - component: main
    capability: refresh
    version: 1
  automation:
    conditions:
    - component: main
      capability: mode
      version: 1
      patch:
      - op: replace
        path: /0/displayType
        value: dynamicList
      - op: add
        path: /0/dynamicList
        value:
          value: mode.value
          supportedValues:
            value: supportedArguments.value
      - op: remove
        path: /0/list
    actions:
    - component: main
      capability: mode
      version: 1
      patch:
      - op: replace
        path: /0/displayType
        value: dynamicList
      - op: add
        path: /0/dynamicList
        value:
          value: mode.value
          supportedValues:
            value: supportedArguments.value
      - op: remove
        path: /0/list
